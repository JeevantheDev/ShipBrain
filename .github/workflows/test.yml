name: Test

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
        env:
          LLM_PROVIDER: anthropic
          GITHUB_WEBHOOK_SECRET: test-secret-123
